name: build

on:
  push:
    tags-ignore:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: i686-pc-windows-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Windows linker
        if: contains(matrix.target, 'windows-gnu')
        run: |
          sudo apt update && sudo apt install -y mingw-w64

      - name: Install 32-bit Linux libraries
        if: contains(matrix.target, 'i686-unknown-linux-gnu')
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            gcc-multilib \
            g++-multilib \
            libc6-dev-i386

      - name: Build package
        id: build-package
        run: |
          cargo build --target ${{ matrix.target }} --release
          PATH_TO_ARTIFACT="$(cargo build --message-format=json | jq -r 'select(.executable != null) | .executable')"
          echo "path-to-artifact=$PATH_TO_ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: rootfs
          scan-ref: ${{ steps.build-package.outputs.path-to-artifact }}
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
